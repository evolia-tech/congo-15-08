<section class="map-section">
  <div class="map-header">
    <h2 class="map-title">
      <span class="title-flame">🔥</span>
      La flamme du Congo illumine le monde
    </h2>
    <p class="map-subtitle">
      {{ totalParticipants | number }} participants depuis {{ activeCountries }} pays
    </p>
  </div>

  <div class="map-container">
    <app-world-map [participations]="participations"></app-world-map>
  </div>
</section>
