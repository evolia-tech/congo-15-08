<section class="hero-section">
  <div class="hero-bg">
    <div class="grid-overlay"></div>
    <div class="glow-orb-center"></div>
  </div>

  <div class="hero-content">
    <!-- CSS Flame -->
    <div class="flame-wrapper">
      <div class="css-flame">
        <div class="flame-particle particle-red"></div>
        <div class="flame-particle particle-orange"></div>
        <div class="flame-particle particle-yellow"></div>
        <div class="flame-particle particle-white"></div>
        <div class="flame-ember ember-1"></div>
        <div class="flame-ember ember-2"></div>
        <div class="flame-ember ember-3"></div>
        <div class="flame-core"></div>
      </div>
    </div>

    <!-- Counter -->
    <div class="counter-block">
      <h1 class="massive-counter">{{ displayFlames() | number:'1.0-0' }}</h1>
      <span class="counter-label">Flammes allumées pour le Congo</span>
    </div>
  </div>
</section>
