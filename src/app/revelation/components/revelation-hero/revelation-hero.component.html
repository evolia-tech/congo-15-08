<section class="hero-section">
  <div class="hero-bg">
    <div class="grid-overlay"></div>
    <div class="glow-orb-center"></div>
  </div>

  <div class="hero-content large-container">
    <!-- CSS Flame -->
    <div class="flame-wrapper">
      <app-flame></app-flame>
    </div>

    <!-- Counter -->
    <div class="counter-block">
      <h1 class="massive-counter">{{ displayFlames() | number:'1.0-0' }}</h1>
      <span class="counter-label">Flammes allumées pour le Congo</span>
    </div>
  </div>
</section>
