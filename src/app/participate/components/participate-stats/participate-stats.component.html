<section class="participate-bottom-section">
  <div class="bottom-container">
    <div class="bottom-content-grid">
      <div class="bottom-left">
        <!-- Compact statistics boxes -->
        <div class="sidebar-stats-card glass-card sidebar-cyan-glow">
          <div class="sidebar-stat-row">
            <div class="sidebar-stat-icon-box">
              <i class="pi pi-globe sidebar-icon-cyan"></i>
            </div>
            <div class="sidebar-stat-info">
              <span class="sidebar-stat-val">{{ countriesCount | number }}</span>
              <span class="sidebar-stat-lbl">Pays participants</span>
            </div>
          </div>
          
          <div class="sidebar-stat-divider"></div>
          
          <div class="sidebar-stat-row">
            <div class="sidebar-stat-icon-box">
              <i class="pi pi-map sidebar-icon-gold"></i>
            </div>
            <div class="sidebar-stat-info">
              <span class="sidebar-stat-val">{{ departmentsCount }} / 12</span>
              <span class="sidebar-stat-lbl">Départements illuminés</span>
            </div>
          </div>
        </div>
      </div>
      
      <!-- Right side empty for the form card overflow -->
      <div class="bottom-right"></div>
    </div>
  </div>
</section>
