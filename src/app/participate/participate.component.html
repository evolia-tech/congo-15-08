<div class="participate-page-wrapper">
  <!-- Futuristic Background Elements -->
  <div class="glow-orb glow-orb-cyan"></div>
  <div class="glow-orb glow-orb-gold"></div>
  <div class="grid-overlay"></div>

  <!-- Hero Section (Form is inside) -->
  <app-participate-hero [flamesTotal]="flamesTotal" [isLoading]="isLoadingStats()" [showSuccess]="showSuccess" (formSuccess)="onFormSuccess($event)"
    (resetSuccess)="onResetSuccess()"></app-participate-hero>

  <!-- Stats Section — overlaps below the hero with the form card floating on top -->
  <app-participate-stats></app-participate-stats>

  <!-- Reassurance Section -->
  <app-participate-reassurance></app-participate-reassurance>

  <app-participate-messages></app-participate-messages>
</div>
