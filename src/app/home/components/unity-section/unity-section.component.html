<section class="unity-section">
  <!-- Glowing background orbs -->
  <div class="glow-orb-unity-green"></div>
  <div class="glow-orb-unity-gold"></div>

  <!-- Floating particles container -->
  <div class="particle-container">
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
    <div class="particle"></div>
  </div>

  <div class="unity-content-wrapper">
    <div class="quote-container">
      <p class="quote-text">
        "Le 15 août,<br> le Congo brillera <br>d’une seule lumière."
      </p>
      <span class="quote-sub">Rejoignez le mouvement de solidarité nationale.</span>
    </div>

    <!-- Giant Glowing CTA Button -->
    <div class="cta-container">
      <button class="btn-giant-glow" type="button" (click)="scrollToForm()" aria-label="Rejoindre l'union numérique">
        <span class="btn-content">
          <span class="btn-glow-layer"></span>
          <span class="btn-shimmer"></span>
          <span class="btn-text">Allumer ma flamme</span>
        </span>
      </button>
    </div>

    <!-- Stylized Glowing Massive Flame -->
    <div class="massive-css-flame-wrapper">
      <div class="css-flame">
        <div class="flame-particle particle-red"></div>
        <div class="flame-particle particle-orange"></div>
        <div class="flame-particle particle-yellow"></div>
        <div class="flame-particle particle-white"></div>
        <div class="flame-ember ember-1"></div>
        <div class="flame-ember ember-2"></div>
        <div class="flame-ember ember-3"></div>
        <div class="flame-core"></div>
      </div>
    </div>
  </div>
</section>
