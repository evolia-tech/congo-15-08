<div class="modal-backdrop" [class.is-closing]="isClosing" (click)="onBackdropClick($event)">
  <div class="modal-panel" [class.is-closing]="isClosing" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Close button -->
    <button class="btn-close" (click)="close()" aria-label="Fermer">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
        stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>

    <!-- Header -->
    <p class="modal-subtitle">
      Félicitations <b>{{ activeProfile?.firstName }}</b>&nbsp;, vous pouvez télécharger votre carte de participation et
      la partagez pour inspirer d'autres Congolais.
    </p>

    <div class="action-row">
      <button class="btn-action btn-download" (click)="download()" id="btn-download-flame" title="Télécharger">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" />
          <polyline points="7 10 12 15 17 10" />
          <line x1="12" y1="15" x2="12" y2="3" />
        </svg>
        Télécharger
      </button>

      <button class="btn-action btn-share" (click)="shareNative()" id="btn-native-share" title="Partager ma carte">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <circle cx="18" cy="5" r="3" />
          <circle cx="6" cy="12" r="3" />
          <circle cx="18" cy="19" r="3" />
          <line x1="8.59" y1="13.51" x2="15.42" y2="17.49" />
          <line x1="15.41" y1="6.51" x2="8.59" y2="10.49" />
        </svg>
        Partager ma carte
      </button>

      <button class="btn-action btn-invite" (click)="inviteFriend()" id="btn-invite-friend" title="Inviter un proche">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
          <circle cx="8.5" cy="7" r="4" />
          <line x1="20" y1="8" x2="20" y2="14" />
          <line x1="23" y1="11" x2="17" y2="11" />
        </svg>
        Inviter un proche
      </button>
    </div>
    <div class="image-action">
      @if(activeProfile){

      <!-- Card image — full width, no crop -->
      <img [src]="activeProfile.dataUrl" [alt]="'Flamme de ' + activeProfile.firstName" class="composed-image" />

      <!-- Action buttons -->
      <div class="right">



        <!-- Multi-profile Tabs -->
        @if (profiles.length > 1) {
        <div class="profile-tabs">
          <span class="tabs-label">Cartes enregistrées :</span>
          <div class="tabs-row">
            @for (p of profiles; track p.id) {
            <button class="tab-btn" [class.is-active]="activeProfile?.id === p.id" (click)="selectProfile(p.id)">
              {{ p.firstName }}
            </button>
            }
          </div>
        </div>
        }
      </div>

      }
    </div>
  </div>
</div>
