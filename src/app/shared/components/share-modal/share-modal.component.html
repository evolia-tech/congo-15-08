<div class="modal-backdrop" [class.is-visible]="isVisible" (click)="onBackdropClick($event)">
  <div class="modal-panel" [class.is-visible]="isVisible" role="dialog" aria-modal="true" aria-labelledby="modal-title">

    <!-- Close button -->
    <button class="btn-close" (click)="close()" aria-label="Fermer">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>

    <!-- Header -->
    <div class="modal-header">
      <div class="flame-badge">🔥</div>
      <h2 id="modal-title" class="modal-title">Votre montage est prêt !</h2>
      <p class="modal-subtitle">
        Téléchargez votre flamme et partagez-la pour inspirer d'autres Congolais.
      </p>
    </div>

    <!-- Composed image preview -->
    <div class="image-preview-wrapper">
      <img [src]="imageDataUrl" [alt]="'Flamme de ' + firstName" class="composed-image">
      <!-- Overlay shimmer -->
      <div class="preview-shimmer"></div>
    </div>

    <!-- Action buttons -->
    <div class="modal-actions">

      <!-- Download -->
      <button class="btn-download" (click)="download()" id="btn-download-flame">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span>Télécharger mon montage</span>
      </button>

      <!-- Social share row -->
      <div class="social-row">
        <span class="social-label">Partager sur</span>
        <div class="social-buttons">

          <!-- Facebook -->
          <button class="btn-social btn-facebook" (click)="shareOnFacebook()" id="btn-share-facebook" aria-label="Partager sur Facebook">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/>
            </svg>
            <span>Facebook</span>
          </button>

          <!-- X / Twitter -->
          <button class="btn-social btn-twitter" (click)="shareOnTwitter()" id="btn-share-twitter" aria-label="Partager sur X (Twitter)">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
              <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
            </svg>
            <span>X</span>
          </button>

          <!-- WhatsApp -->
          <button class="btn-social btn-whatsapp" (click)="shareOnWhatsApp()" id="btn-share-whatsapp" aria-label="Partager sur WhatsApp">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 0 1-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 0 1-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 0 1 2.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0 0 12.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 0 0 5.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 0 0-3.48-8.413z"/>
            </svg>
            <span>WhatsApp</span>
          </button>

        </div>
      </div>
    </div>

    <!-- Footer note -->
    <p class="modal-note">
      Votre participation est enregistrée. Merci de faire briller le Congo ! 🇨🇬
    </p>
  </div>
</div>
