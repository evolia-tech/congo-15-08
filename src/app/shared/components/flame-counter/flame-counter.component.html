<div class="flame-counter-card" [class.has-countdown]="showCountdown">
  <!-- Glowing background effect behind the flame -->
  <div class="flame-glow-bg"></div>

  <!-- Realistic Animated CSS Flame -->
  <div class="flame-animation-wrapper">
    <app-flame></app-flame>
  </div>

  <!-- Display Counter digits -->
  <div class="counter-display">
    <span class="counter-val">{{ displayValue() | number }}</span>
    <span class="counter-lbl">flammes allumées</span>
  </div>

  @if (showCountdown) {
  <div class="card-countdown-block">
    <span class="countdown-days">J-30</span>
    <span class="countdown-date">15 Août</span>
  </div>
  }
</div>
